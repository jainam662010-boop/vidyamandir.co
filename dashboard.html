<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Vidya Mandir</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* Continue Learning hero card */
.continue-card {
  background: linear-gradient(135deg, rgba(var(--br),.18) 0%, rgba(var(--br),.06) 100%);
  border: 1px solid var(--bdr2);
  border-radius: var(--rl); padding: 22px 24px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  position: relative; overflow: hidden; margin-bottom: 24px;
}
.continue-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--b), var(--a), var(--bl), var(--b));
  background-size: 200% auto; animation: shimmer 3s linear infinite;
}
@keyframes shimmer { to { background-position: 200% center; } }
.continue-card::after {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, rgba(var(--br),.12) 0%, transparent 70%);
  pointer-events: none;
}
.cont-icon {
  width: 58px; height: 58px; border-radius: 16px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--b), var(--a));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; box-shadow: 0 6px 20px rgba(var(--br),.35);
}
.cont-info { flex: 1; min-width: 0; }
.cont-label { font-size: .68rem; font-weight: 800; color: var(--bl); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
.cont-title { font-family: var(--fd); font-size: 1.15rem; font-weight: 700; color: var(--t1); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cont-sub   { font-size: .78rem; color: var(--t2); }
.cont-prog  { margin-top: 9px; }

/* Streak badge */
.streak-ring {
  width: 68px; height: 68px; border-radius: 50%; flex-shrink: 0;
  background: conic-gradient(var(--b) var(--streak-angle, 0deg), rgba(var(--br),.1) 0deg);
  display: flex; align-items: center; justify-content: center; position: relative;
}
.streak-inner {
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--bg2); display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.streak-num { font-family: var(--fd); font-size: 1.3rem; font-weight: 700; color: var(--bl); line-height: 1; }
.streak-lbl { font-size: .52rem; font-weight: 800; text-transform: uppercase; color: var(--t3); letter-spacing: .05em; }

/* Quick actions row */
.quick-row { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.quick-action {
  flex: 1; min-width: 110px; padding: 13px 14px;
  background: var(--gl); border: 1px solid var(--bdr); border-radius: var(--rl);
  display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
  cursor: pointer; text-decoration: none; color: inherit; transition: all .22s var(--ease);
  position: relative; overflow: hidden;
}
.quick-action::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--qa-c, var(--b)); opacity: 0; transition: opacity .2s; }
.quick-action:hover { border-color: var(--bdr2); transform: translateY(-3px); box-shadow: var(--sh); }
.quick-action:hover::before { opacity: 1; }
.qa-icon { font-size: 20px; }
.qa-label { font-size: .78rem; font-weight: 700; color: var(--t1); }
.qa-sub   { font-size: .67rem; color: var(--t3); }

/* Announcement banner */
.ann-banner {
  background: linear-gradient(135deg, rgba(var(--br),.1), rgba(var(--br),.04));
  border: 1px solid var(--bdr); border-radius: var(--rl);
  margin-bottom: 20px; overflow: hidden;
}
.ann-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 16px; border-bottom: 1px solid var(--bdr);
}
.ann-row:last-child { border-bottom: none; }
</style>
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;height:200px"><div class="spinner"></div></div>
  </main>
</div>
<script src="js/app.js"></script>
<script src="js/theme_todo.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  App.initPage('dashboard');
  const data = await App.loadData();
  const p    = App.getProgress();
  const admData = JSON.parse(localStorage.getItem('vm_admin_data') || '{"announcements":[],"pdfs":[],"ncertTopics":[]}');

  let totalDone=0, totalQz=0, totalPct=0, lastSubj=null, lastCh=null;
  data.subjects.forEach(s=>{
    const sp=p[s.id]||{};
    totalDone+=(sp.done||[]).length;
    Object.values(sp.scores||{}).forEach(sc=>{totalQz++;totalPct+=sc.pct});
    if(sp.last){lastSubj=s;lastCh=sp.last}
  });
  const avgQ   = totalQz ? Math.round(totalPct/totalQz) : 0;
  const streak = parseInt(localStorage.getItem('vm_streak')||'0');
  const streakAngle = Math.min(360, streak*36); // max 10 days = 360
  const siteName = localStorage.getItem('vm_site_name')||'Vidya Mandir';
  const motd     = localStorage.getItem('vm_motd')||'ज्ञान एक दीपक है जो अंधकार को दूर करता है।';
  const anns     = (admData.announcements||[]).slice(0,3);

  // Continue learning card
  const contHTML = lastCh ? `
    <div class="continue-card au">
      <div class="cont-icon">${lastSubj?.icon||'📚'}</div>
      <div class="cont-info">
        <div class="cont-label">▶ Continue Learning</div>
        <div class="cont-title">${lastCh.title}</div>
        <div class="cont-sub">${lastSubj?.name||''} · Pick up from where you left off</div>
        <div class="cont-prog" style="margin-top:9px">
          <div class="pbar pbar-sm" style="max-width:240px"><div class="pfill" style="width:${App.getSubjPct(lastSubj?.id,lastSubj)||0}%"></div></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div class="streak-ring" style="--streak-angle:${streakAngle}deg">
          <div class="streak-inner">
            <span class="streak-num">🔥${streak}</span>
            <span class="streak-lbl">streak</span>
          </div>
        </div>
        <a href="chapter.html?subject=${lastSubj?.id||''}&chapter=${lastCh.cid}" class="btn btn-b btn-sm">Resume →</a>
      </div>
    </div>` : '';

  document.getElementById('mainArea').innerHTML = `
    <div class="page-head au">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="font-size:32px;margin-top:2px">🙏</div>
        <div>
          <h1>नमस्ते! &nbsp;<span class="hi">${siteName}</span></h1>
          <div class="lead" style="font-style:italic;color:var(--bl);opacity:.85">"${motd}"</div>
        </div>
      </div>
    </div>

    ${contHTML}

    <!-- Stats -->
    <div class="stats-strip au-1">
      <div class="stat-tile"><div class="stat-ico">📚</div><div><div class="stat-num">${data.subjects.length}</div><div class="stat-lbl">Subjects</div></div></div>
      <div class="stat-tile"><div class="stat-ico">✅</div><div><div class="stat-num">${totalDone}</div><div class="stat-lbl">Done</div></div></div>
      <div class="stat-tile"><div class="stat-ico">🏆</div><div><div class="stat-num">${avgQ}%</div><div class="stat-lbl">Quiz Avg</div></div></div>
      <div class="stat-tile"><div class="stat-ico">🔥</div><div><div class="stat-num">${streak}</div><div class="stat-lbl">Streak</div></div></div>
    </div>

    <!-- Quick actions -->
    <div class="quick-row au-1">
      <a href="subject.html?id=mathematics" class="quick-action" style="--qa-c:var(--b)"><div class="qa-icon">📐</div><div class="qa-label">Ganit</div><div class="qa-sub">Mathematics</div></a>
      <a href="subject.html?id=science" class="quick-action" style="--qa-c:var(--tl)"><div class="qa-icon">🔬</div><div class="qa-label">Vigyan</div><div class="qa-sub">Science</div></a>
      <a href="subject.html?id=social-science" class="quick-action" style="--qa-c:var(--a)"><div class="qa-icon">🌍</div><div class="qa-label">Samaj</div><div class="qa-sub">Social Science</div></a>
      <a href="subject.html?id=english" class="quick-action" style="--qa-c:var(--tl)"><div class="qa-icon">📚</div><div class="qa-label">Angrezi</div><div class="qa-sub">English</div></a>
      <a href="todo.html" class="quick-action" style="--qa-c:var(--b)"><div class="qa-icon">📋</div><div class="qa-label">My Tasks</div><div class="qa-sub">Study planner</div></a>
    </div>

    ${anns.length ? `
    <div class="ann-banner au-2">
      <div style="padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--bl)">📢 Announcements</span>
        <span class="chip chip-b">${anns.length}</span>
      </div>
      ${anns.map(a=>`<div class="ann-row">
        <span class="chip chip-${a.type==='exam'?'a':a.type==='info'?'tl':'b'}" style="flex-shrink:0;margin-top:1px">${a.type}</span>
        <div style="flex:1"><div style="font-size:.84rem;font-weight:700;margin-bottom:1px">${a.title}</div><div style="font-size:.77rem;color:var(--t2)">${a.text}</div></div>
        <div style="font-size:.68rem;color:var(--t4);flex-shrink:0">${a.date||''}</div>
      </div>`).join('')}
    </div>` : ''}

    <!-- Subjects grid -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px" class="au-2">
      <h2 class="section-title">विषय &middot; Subjects</h2>
      <span class="chip chip-b">4 Core Subjects</span>
    </div>
    <div class="subjects-grid" id="subjGrid"></div>

    <!-- Recent tasks -->
    <div style="margin-top:28px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between" class="au-3">
      <h2 class="section-title">📋 Recent Tasks</h2>
      <a href="todo.html" class="btn btn-gh btn-sm">All tasks →</a>
    </div>
    <div id="todoPreview" style="max-width:680px"></div>`;

  // Subject cards
  document.getElementById('subjGrid').innerHTML = data.subjects.map((s,i)=>{
    const pct  = App.getSubjPct(s.id,s);
    const sp   = p[s.id]||{};
    const done = (sp.done||[]).length;
    return `<a href="subject.html?id=${s.id}" class="subj-card au" style="animation-delay:${i*70}ms;--sc-g:${s.gradient};--sc-gw:${s.glow};--sc-bg:${s.bg};--sc-bdr:${s.border}">
      <div class="sc-blob"></div>
      <div class="sc-top">
        <div class="sc-em">${s.icon}</div>
        <div class="sc-go">→</div>
      </div>
      <div class="sc-name">${s.name}</div>
      <div class="sc-hint" style="font-family:var(--fd);font-style:italic">${s.nameHi}</div>
      <div class="sc-hint" style="margin-top:4px;font-family:inherit;font-style:normal">${s.description}</div>
      <div class="sc-meta">
        <div class="sc-mi">📄 ${s.chapters.length} ch.</div>
        <div class="sc-mi">✅ ${done} done</div>
      </div>
      <div style="margin-bottom:11px">
        <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--t3);margin-bottom:4px">
          <span>Progress</span><span>${pct}%</span>
        </div>
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      </div>
      <div class="sc-foot">
        <span style="font-size:.71rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:155px;color:var(--t3)">⏱ ${sp.last?.title||'Not started'}</span>
        <div class="sc-pill">${pct>0?'Continue →':'Start →'}</div>
      </div>
    </a>`;
  }).join('');

  // Recent todos
  const todos = TodoPanel.getData().slice(0,4);
  document.getElementById('todoPreview').innerHTML = todos.length
    ? `<div class="todo-items">${todos.map(t=>TodoPanel.itemHTML(t)).join('')}</div>`
    : `<div style="color:var(--t3);font-size:.84rem;padding:8px 0">No tasks yet. <a href="todo.html" style="color:var(--bl)">Add your first study task →</a></div>`;
});
</script>
<div class="page-watermark"></div>
</body>
</html>
