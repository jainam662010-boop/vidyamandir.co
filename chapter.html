<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chapter — Vidya Mandir</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;height:200px"><div class="spinner"></div></div>
  </main>
</div>
<script src="js/app.js"></script>
<script src="js/theme_todo.js"></script>
<script>
/* ── Quiz Engine ── */
const Quiz = {
  qs:[], cur:0, sel:null, answered:false, score:0, sid:null, cid:null,
  start(qs, sid, cid) {
    Object.assign(this, { qs, cur:0, sel:null, answered:false, score:0, sid, cid });
    this.render();
  },
  render() {
    const q = this.qs[this.cur], pct = (this.cur/this.qs.length)*100;
    const L = ['A','B','C','D'];
    document.getElementById('quizBody').innerHTML = `
      <div class="qpbar"><div class="qpfill" style="width:${pct}%"></div></div>
      <span class="q-num-label">Question ${this.cur+1} of ${this.qs.length}</span>
      <div class="q-text">${q.q}</div>
      <div class="q-opts">${q.options.map((o,i)=>`
        <button class="q-opt" onclick="Quiz.pick(${i})">
          <div class="q-opt-lbl">${L[i]}</div>${o}
        </button>`).join('')}</div>
      <div class="q-fb" id="qfb"></div>
      <div class="q-actions">
        <button class="btn btn-b" id="qSub" onclick="Quiz.submit()">Submit Answer</button>
        <button class="btn btn-gh" id="qNext" onclick="Quiz.next()" style="display:none">${this.cur<this.qs.length-1?'Next →':'See Results'}</button>
      </div>`;
  },
  pick(i) { if (this.answered) return; this.sel = i; document.querySelectorAll('.q-opt').forEach((el,j) => el.classList.toggle('sel', j===i)); },
  submit() {
    if (this.sel === null || this.answered) return;
    this.answered = true;
    const q = this.qs[this.cur];
    document.querySelectorAll('.q-opt').forEach((el, i) => { if(i===q.answer) el.classList.add('ok'); else if(i===this.sel) el.classList.add('ng'); });
    const fb = document.getElementById('qfb');
    if (this.sel === q.answer) { this.score++; fb.className='q-fb ok show'; fb.textContent='✅ Correct!'; }
    else { fb.className='q-fb ng show'; fb.innerHTML=`❌ Incorrect. Correct: <strong>${q.options[q.answer]}</strong>`; }
    document.getElementById('qSub').style.display = 'none';
    document.getElementById('qNext').style.display = 'inline-flex';
    document.querySelector('.qpfill').style.width = `${((this.cur+1)/this.qs.length)*100}%`;
  },
  next() { if (this.cur >= this.qs.length-1) { this.result(); return; } this.cur++; this.sel=null; this.answered=false; this.render(); },
  result() {
    const pct = Math.round(this.score/this.qs.length*100);
    const [e,m] = pct>=80 ? ['🏆','Board Ready! Excellent!'] : pct>=60 ? ['👍','Good work!'] : pct>=40 ? ['📚','Keep practising!'] : ['💪','Revise and retry!'];
    document.getElementById('quizBody').innerHTML = `<div class="quiz-result">
      <div class="qr-em">${e}</div>
      <div style="font-family:var(--font-d);font-size:1.1rem;color:var(--saffron-l);margin-bottom:8px">${m}</div>
      <div class="qr-score">${this.score}/${this.qs.length}</div>
      <div class="qr-label">${pct}% accuracy</div>
      <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-gh" onclick="Quiz.start(Quiz.qs,Quiz.sid,Quiz.cid)">↺ Retry</button>
        <button class="btn btn-tl" onclick="ChPage.markDone()">✅ Mark Chapter Complete</button>
      </div>
    </div>`;
    App.saveScore(this.sid, this.cid, this.score, this.qs.length);
  }
};

/* ── Chapter Page ── */
const ChPage = {
  sid: null, cid: null, subj: null, ch: null, li: 0,
  async init() {
    this.sid = App.getParam('subject'); this.cid = App.getParam('chapter');
    if (!this.sid || !this.cid) { location.href = 'dashboard.html'; return; }
    await App.loadData();
    this.subj = App.getSubject(this.sid); this.ch = App.getChapter(this.sid, this.cid);
    if (!this.subj || !this.ch) { location.href = 'dashboard.html'; return; }
    document.title = `${this.ch.title} — Vidya Mandir`;
    App.initPage(this.sid);
    const li = this.ch.lessons.findIndex(l => l.id === App.getParam('lesson'));
    if (li >= 0) this.li = li;
    this.render();
    App.setLast(this.sid, this.cid, this.ch.lessons[this.li]?.title || this.ch.title);
  },
  render() {
    const { ch, subj, sid, cid } = this;
    const lesson = ch.lessons[this.li] || ch.lessons[0];
    const p = App.getProgress();
    const isDone = (p[sid]?.done || []).includes(cid);
    const admData = JSON.parse(localStorage.getItem('vm_admin_data') || '{}');
    const pdfs = (admData.pdfs || []).filter(pdf => pdf.chapter === cid || pdf.subject === sid);
    const admTopics = (admData.ncertTopics || []).filter(t => t.chapter === cid || t.subject === sid);
    const allTopics = [...(ch.ncertTopics || []), ...admTopics];
    const adminNote = ch._adminNote;

    document.getElementById('mainArea').innerHTML = `
    <div class="page-head au">
      <div class="breadcrumb">
        <a href="dashboard.html">Dashboard</a><span class="sep">›</span>
        <a href="subject.html?id=${sid}">${subj.name}</a><span class="sep">›</span>
        <span>${ch.title}</span>
      </div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <h1>${ch.title}</h1>
          <div class="subtitle" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:5px;font-size:.78rem">
            <span>▶ ${ch.lessons.length} lessons</span>
            <span>⏱ ${ch.duration}</span>
            <span>❓ ${ch.quiz.length} questions</span>
            <span>⭐ ${allTopics.length} NCERT topics</span>
            ${pdfs.length ? `<span style="color:var(--indigo-l)">📁 ${pdfs.length} PDFs</span>` : ''}
            ${isDone ? `<span style="color:var(--sage-l)">✅ Complete</span>` : ''}
          </div>
        </div>
        ${isDone ? `<span class="chip chip-tl" style="font-size:.8rem;padding:5px 12px">✅ Done</span>` : ''}
      </div>
    </div>

    <div class="chapter-grid">
      <!-- MAIN COLUMN -->
      <div>
        <!-- Video -->
        <div class="vid-wrap au">
          <div class="card-top-rule"></div>
          <div class="vid-embed">
            <iframe id="vFrame" src="https://www.youtube-nocookie.com/embed/${lesson.videoId}?rel=0&modestbranding=1"
              title="${lesson.title}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe>
          </div>
          <div class="vid-meta">
            <h3 id="vTitle">${lesson.title}</h3>
            <div style="display:flex;gap:10px;font-size:.73rem;color:var(--t3)">
              <span>⏱ <span id="vDur">${lesson.duration}</span></span>
              <span style="color:${subj.color||'var(--saffron)'}">${subj.icon} ${subj.name}</span>
            </div>
          </div>
        </div>

        <!-- Lessons -->
        <div class="lesson-card au-1">
          <div class="card-head"><h3>📋 Lessons</h3><span style="font-size:.73rem;color:var(--t3)">${ch.lessons.length} total</span></div>
          ${ch.lessons.map((l, i) => `<div class="lesson-row ${i===this.li?'active':''}" onclick="ChPage.switchLesson(${i})">
            <div class="lesson-n">${i===this.li?'▶':i+1}</div>
            <div style="flex:1"><div class="lesson-title">${l.title}</div></div>
            <div class="lesson-dur">⏱ ${l.duration}</div>
          </div>`).join('')}
        </div>

        <!-- Admin note (if set) -->
        ${adminNote ? `
        <div class="card au-2" style="margin-bottom:15px">
          <div class="card-top-rule"></div>
          <div class="card-pad">
            <div style="font-family:var(--font-d);font-size:.88rem;color:var(--saffron-l);margin-bottom:6px;font-weight:700">📌 Teacher's Note</div>
            <p style="font-size:.84rem;color:var(--t2);line-height:1.7;white-space:pre-line">${adminNote}</p>
          </div>
        </div>` : ''}

        <!-- NCERT Topics -->
        ${allTopics.length ? `
        <div class="topics-card au-2">
          <div class="card-top-rule"></div>
          <div class="card-head">
            <h3>⭐ NCERT Important Topics</h3>
            <span class="chip chip-a">Board Focus</span>
          </div>
          ${allTopics.map((t, i) => `<div class="topic-row">
            <div class="topic-n">${i+1}</div>
            <div class="topic-text">
              ${t.text}
              ${t.important ? '<span style="color:var(--saffron);margin-left:5px">★</span>' : ''}
              ${t.type ? `<span class="chip chip-tl" style="font-size:.62rem;padding:1px 6px;margin-left:6px">${t.type}</span>` : ''}
            </div>
            ${t.marks ? `<div class="topic-marks">${t.marks}M</div>` : ''}
          </div>`).join('')}
        </div>` : ''}

        <!-- PDFs -->
        ${pdfs.length ? `
        <div class="pdf-card au-3">
          <div class="card-top-rule"></div>
          <div class="card-head"><h3>📁 PDF Resources</h3><span class="chip chip-tl">${pdfs.length} file${pdfs.length>1?'s':''}</span></div>
          <div class="card-pad">
            ${pdfs.map(pdf => `<div class="pdf-row" onclick="ChPage.viewPDF('${pdf.url}')">
              <span style="font-size:20px">📄</span>
              <span style="flex:1;font-size:.84rem;font-weight:600;color:var(--t1)">${pdf.name}</span>
              <span class="chip tag-${pdf.type==='Notes'?'saffron':pdf.type==='Questions'?'terra':'indigo'}">${pdf.type||'Notes'}</span>
              <a href="${pdf.url}" download="${pdf.name}" class="btn btn-gh btn-sm" onclick="event.stopPropagation()">⬇</a>
            </div>`).join('')}
            <div id="pdfViewerWrap" style="display:none;margin-top:10px;border-radius:10px;overflow:hidden">
              <iframe id="pdfFrame" src="" style="width:100%;height:480px;border:none;background:#fff"></iframe>
            </div>
          </div>
        </div>` : ''}

        <!-- Notes -->
        <div class="notes-card au-3">
          <div class="card-top-rule"></div>
          <div class="card-head">
            <h3>📝 Chapter Notes</h3>
            <div style="display:flex;gap:6px">
              <span class="chip chip-b">NCERT</span>
              <button class="btn btn-gh btn-sm" onclick="ChPage.printNotes()">🖨 Print</button>
            </div>
          </div>
          <div class="notes-body" id="notesBody">${this.renderNotes(ch.notes)}</div>
        </div>

        <!-- Quiz -->
        <div class="quiz-card au-4">
          <div class="card-top-rule"></div>
          <div class="card-head"><h3>🧠 Chapter Quiz</h3><span class="chip chip-a">${ch.quiz.length} Qs</span></div>
          <div id="quizBody" class="quiz-body">
            <div style="text-align:center;padding:14px">
              <p style="color:var(--t2);margin-bottom:14px;font-size:.88rem">Test your knowledge of <strong>${ch.title}</strong></p>
              <button class="btn btn-b btn-lg" onclick="Quiz.start(ChPage.getAllQuiz(),'${sid}','${cid}')">🚀 Start Quiz</button>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:4px">
          <button class="btn btn-b" onclick="ChPage.markDone()">✅ Mark Complete</button>
          <a href="subject.html?id=${sid}" class="btn btn-gh">← Back to ${subj.name}</a>
          <button class="btn btn-gh" onclick="ChPage.addTodo()">📋 Add to To-Do</button>
        </div>
      </div>

      <!-- SIDEBAR COLUMN -->
      <div>
        <!-- Educators -->
        <div class="side-card">
          <div class="card-top-rule"></div>
          <div class="card-head"><h3>👨‍🏫 Educators</h3></div>
          <div style="padding:10px;display:flex;flex-direction:column;gap:7px">
            ${ch.teachers.map(t => `<div class="teacher-row">
              <div class="teacher-av" style="background:${t.color||'var(--saffron)'};color:var(--bg)">${t.avatar}</div>
              <div><div style="font-size:.83rem;font-weight:700">${t.name}</div><div style="font-size:.7rem;color:var(--t3)">📺 ${t.channel}</div></div>
            </div>`).join('')}
          </div>
        </div>

        <!-- Chapter Nav -->
        <div class="side-card">
          <div class="card-top-rule"></div>
          <div class="card-head"><h3>📑 ${subj.name}</h3></div>
          <div style="padding:7px">
            ${subj.chapters.map((c, i) => {
              const d2 = (p[sid]?.done||[]).includes(c.id);
              return `<a href="chapter.html?subject=${sid}&chapter=${c.id}" class="ch-nav-link ${c.id===cid?'active':''} ${d2?'done-ch':''}">
                <div class="ch-nav-n">${d2?'✓':i+1}</div>
                <span>${c.title}</span>
              </a>`;
            }).join('')}
          </div>
        </div>

        <!-- Quick Task -->
        <div class="side-card" style="padding:15px">
          <div class="card-top-rule"></div>
          <div style="font-family:var(--font-d);font-size:.88rem;color:var(--saffron-l);margin-bottom:10px;font-weight:700">📋 Quick Task</div>
          <input class="todo-inp" id="qTask" placeholder="Note a revision task…" style="margin-bottom:7px;width:100%" onkeydown="if(event.key==='Enter')ChPage.addQuick()">
          <select class="fc" id="qPri" style="margin-bottom:8px;font-size:.8rem">
            <option value="normal">Normal</option>
            <option value="high">🔴 High Priority</option>
          </select>
          <button class="btn btn-b btn-sm" style="width:100%;justify-content:center" onclick="ChPage.addQuick()">+ Add Task</button>
        </div>
      </div>
    </div>`;
  },

  getAllQuiz() {
    // Merge built-in + any admin custom quiz for this chapter/subject
    const admData = JSON.parse(localStorage.getItem('vm_admin_data') || '{}');
    const admQuiz = (admData.quiz || []).filter(q => q.chapter === this.cid || q.subject === this.sid);
    return [...this.ch.quiz, ...admQuiz];
  },

  renderNotes(n) {
    if (!n?.content) return '<p style="color:var(--t3)">No notes available for this chapter.</p>';
    return n.content.map(item => {
      switch (item.type) {
        case 'intro':    return `<div class="n-intro">${item.text}</div>`;
        case 'heading':  return `<div class="n-heading">${item.text}</div>`;
        case 'text':     return `<p class="n-text">${item.text}</p>`;
        case 'keypoint': return `<div class="n-kp">${item.text}</div>`;
        case 'formula':  return `<div class="n-formula">📐 ${item.text}</div>`;
        case 'example':  return `<div class="n-example"><div class="n-q">💡 ${item.question}</div><div class="n-a">→ ${item.answer}</div></div>`;
        default:         return `<p class="n-text">${item.text||''}</p>`;
      }
    }).join('');
  },

  switchLesson(idx) {
    this.li = idx;
    const l = this.ch.lessons[idx];
    const frame = document.getElementById('vFrame');
    if (frame) frame.src = `https://www.youtube-nocookie.com/embed/${l.videoId}?rel=0&modestbranding=1&autoplay=1`;
    const vTitle = document.getElementById('vTitle'); if (vTitle) vTitle.textContent = l.title;
    const vDur = document.getElementById('vDur'); if (vDur) vDur.textContent = l.duration;
    document.querySelectorAll('.lesson-row').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
      el.querySelector('.lesson-n').textContent = i === idx ? '▶' : i+1;
    });
    App.setLast(this.sid, this.cid, l.title);
  },

  viewPDF(url) {
    const frame = document.getElementById('pdfFrame');
    const wrap = document.getElementById('pdfViewerWrap');
    if (frame) frame.src = url;
    if (wrap) { wrap.style.display = 'block'; wrap.scrollIntoView({ behavior: 'smooth' }); }
  },

  markDone() { App.markDone(this.sid, this.cid); App.toast('🎉 Chapter marked complete!'); },

  addTodo() {
    TodoPanel.add(`Revise: ${this.ch.title}`, this.sid, '', 'normal', '');
    App.toast(`"${this.ch.title}" added to tasks! 📋`);
  },

  addQuick() {
    const inp = document.getElementById('qTask');
    const pri = document.getElementById('qPri')?.value || 'normal';
    const text = inp?.value.trim();
    if (!text) return;
    TodoPanel.add(text, this.sid, '', pri, '');
    inp.value = ''; App.toast('Task added! ✅');
  },

  printNotes() {
    const body = document.getElementById('notesBody')?.innerText || '';
    const w = window.open('', '_blank');
    w.document.write(`<html><head><title>${this.ch.title} — Notes</title>
      <style>body{font-family:Georgia,serif;max-width:680px;margin:40px auto;line-height:1.9;color:#1a0e06;padding:0 20px}
      h1{color:#8A5010}pre{white-space:pre-wrap;font-family:inherit}</style></head>
      <body><h1>📝 ${this.ch.title}</h1><h3 style="color:#666;margin-bottom:24px">${this.subj.name} · Vidya Mandir</h3><hr><pre>${body}</pre><div class="page-watermark"></div>
</body></html>`);
    w.document.close(); w.print();
  }
};

document.addEventListener('DOMContentLoaded', () => ChPage.init());
</script>
<div class="page-watermark"></div>
</body>
</html>
